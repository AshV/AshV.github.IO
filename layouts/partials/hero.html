<header id="hero-section" class="sticky top-6 z-40 w-full mb-8 flex flex-col perspective-[1000px] transition-all">
    <div class="glass-panel glass-spotlight relative overflow-hidden group w-full flex items-center justify-between px-4 min-[400px]:px-6 py-3 md:px-8 md:py-4 rounded-[2rem] md:rounded-[3rem] mt-2 mb-4 transition-all">
        <div class="relative z-10 flex items-center gap-4 md:gap-6">
            <!-- Large Profile Image safely inside container -->
            <div class="w-20 h-20 min-[400px]:w-24 min-[400px]:h-24 md:w-[104px] md:h-[104px] rounded-full overflow-hidden border-[3px] border-white/20 shadow-lg shrink-0 group-hover:shadow-[0_10px_30px_rgba(31,38,135,0.4)] transition-shadow duration-500">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=1000&auto=format&fit=crop" alt="Profile" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            </div>
            
            <!-- Intro -->
            <div class="flex flex-col justify-center py-1">
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-[var(--text-main)] leading-tight focus:outline-none">
                        <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Ashish<br class="block md:hidden"><span class="hidden md:inline"> </span>Vishwakarma</span>
                </h1>
                <p class="hidden md:block text-[var(--text-muted)] text-[10px] min-[400px]:text-xs md:text-sm font-medium leading-none mt-1.5 md:mt-2">
                    Software Engineer | AI Enthusiast | Open Source Contributor
                </p>
            </div>
        </div>
        
        <!-- Social Links - Hidden on Mobile -->
        <div class="hidden md:flex gap-2 lg:gap-3 relative z-10">
            <a href="#" class="p-2 lg:p-2.5 xl:p-3 rounded-full bg-[var(--glass-bg)] border border-[var(--glass-border)] hover:bg-[var(--glass-highlight)] transition-colors backdrop-blur-md group" title="LinkedIn">
                <i data-lucide="linkedin" class="w-4 h-4 lg:w-5 lg:h-5 text-[var(--text-main)] group-hover:scale-110 transition-transform"></i>
            </a>
            <a href="#" class="p-2 lg:p-2.5 xl:p-3 rounded-full bg-[var(--glass-bg)] border border-[var(--glass-border)] hover:bg-[var(--glass-highlight)] transition-colors backdrop-blur-md group" title="GitHub">
                <i data-lucide="github" class="w-4 h-4 lg:w-5 lg:h-5 text-[var(--text-main)] group-hover:scale-110 transition-transform"></i>
            </a>
            <a href="#" class="p-2 lg:p-2.5 xl:p-3 rounded-full bg-[var(--glass-bg)] border border-[var(--glass-border)] hover:bg-[var(--glass-highlight)] transition-colors backdrop-blur-md group" title="X">
                <svg class="w-4 h-4 lg:w-5 lg:h-5 fill-current text-[var(--text-main)] group-hover:scale-110 transition-transform" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a href="#" class="p-2 lg:p-2.5 xl:p-3 rounded-full bg-[var(--glass-bg)] border border-[var(--glass-border)] hover:bg-[var(--glass-highlight)] transition-colors backdrop-blur-md group" title="Instagram">
                <i data-lucide="instagram" class="w-4 h-4 lg:w-5 lg:h-5 text-[var(--text-main)] group-hover:scale-110 transition-transform"></i>
            </a>
            <a href="#" class="p-2 lg:p-2.5 xl:p-3 rounded-full bg-[var(--glass-bg)] border border-[var(--glass-border)] hover:bg-[var(--glass-highlight)] transition-colors backdrop-blur-md group" title="Facebook">
                <i data-lucide="facebook" class="w-4 h-4 lg:w-5 lg:h-5 text-[var(--text-main)] group-hover:scale-110 transition-transform"></i>
            </a>
        </div>
        
        <!-- Shimmer effect -->
        <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-[var(--glass-highlight)] to-transparent group-hover:animate-[shimmer_2s_infinite] pointer-events-none"></div>
    </div>
</header>
